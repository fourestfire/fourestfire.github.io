<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Dean Guo — back soon.">
  <meta name="author" content="Dean Guo">

  <title>Dean Guo</title>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=UA-73120949-1"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'UA-73120949-1');
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital@0;1&family=Raleway:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- FA Icons -->
  <script src="https://use.fontawesome.com/665f8d3210.js"></script>

  <!-- Favicon -->
  <link rel="shortcut icon" href="img/musicbars.ico" type="image/x-icon" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: #101316;
      color: #f8f7f1;
      font-family: 'Raleway', sans-serif;
      font-size: 16px;
      line-height: 1.6;
      overflow: hidden;
    }

    .icon-home {
      position: fixed;
      top: 22px;
      left: 26px;
      z-index: 4;
      display: inline-flex;
      gap: 6px;
      align-items: center;
      color: #f8f7f1;
      text-decoration: none;
    }
    .icon-home i { font-size: 18px; }
    .icon-home:hover { color: #9af8e9; }

    .top-contact {
      position: fixed;
      top: 24px;
      right: 28px;
      z-index: 4;
      color: #d9dfd7;
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    .top-contact:hover { color: #9af8e9; }

    main {
      position: relative;
      z-index: 2;
      height: 100vh;
      display: grid;
      grid-template-columns: 1.05fr 1fr;
      align-items: center;
      gap: 48px;
      padding: 96px 56px 64px;
      max-width: 1240px;
      margin: 0 auto;
    }

    h1.brb {
      font-family: 'Crimson Text', serif;
      font-style: italic;
      font-weight: 400;
      font-size: clamp(160px, 22vw, 280px);
      line-height: 0.85;
      letter-spacing: -0.03em;
      margin-left: -8px;
    }

    .stack {
      list-style: none;
      max-width: 460px;
      border-top: 1px solid rgba(248, 247, 241, 0.16);
    }
    .stack li {
      display: grid;
      grid-template-columns: 110px 1fr auto;
      gap: 16px;
      align-items: baseline;
      padding: 16px 4px;
      border-bottom: 1px solid rgba(248, 247, 241, 0.16);
    }
    .stack li.soon { opacity: 0.42; }
    .stack .key {
      font-family: 'Crimson Text', serif;
      font-size: 24px;
      letter-spacing: 0;
    }
    .stack .desc {
      color: #9aa1a3;
      font-size: 13px;
    }
    .stack .tag {
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #c8c0a4;
      white-space: nowrap;
      border: 1px solid rgba(200, 192, 164, 0.35);
      padding: 3px 7px;
      border-radius: 2px;
    }
    .stack .tag.live {
      color: #9af8e9;
      border-color: rgba(154, 248, 233, 0.45);
    }
    .stack a {
      color: inherit; text-decoration: none;
      display: contents;
    }
    .stack a:hover .key { color: #9af8e9; }
    .stack a:hover .tag { color: #9af8e9; border-color: #9af8e9; }

    .three-canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
      pointer-events: none;
    }

    @media (max-width: 820px) {
      main {
        grid-template-columns: 1fr;
        gap: 36px;
        padding: 96px 28px 64px;
        align-content: center;
      }
      h1.brb {
        font-size: clamp(140px, 36vw, 220px);
        margin-left: 0;
      }
      .stack li {
        grid-template-columns: 1fr auto;
      }
      .stack .desc { grid-column: 1 / -1; order: 3; }
    }
  </style>
</head>

<body>
  <a href="./index.html" class="icon-home" aria-label="Dean Guo home">
    <i class="fa fa-tree" aria-hidden="true"></i>
    <i class="fa fa-heart" aria-hidden="true"></i>
  </a>

  <a href="./contact.html" class="top-contact">contact</a>

  <main>
    <h1 class="brb">brb</h1>

    <ul class="stack" aria-label="Sections">
      <li class="soon" aria-disabled="true">
        <span class="key">now</span>
        <span class="desc">current projects</span>
        <span class="tag">coming soon</span>
      </li>
      <li class="soon" aria-disabled="true">
        <span class="key">notes</span>
        <span class="desc">writing about building</span>
        <span class="tag">coming soon</span>
      </li>
      <li>
        <a href="./archive.html">
          <span class="key">older work</span>
          <span class="desc">earlier stuff</span>
          <span class="tag live">live →</span>
        </a>
      </li>
    </ul>
  </main>

  <script src="js/three.js"></script>
  <script>
    var scene = new THREE.Scene();
    var camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);

    var renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.domElement.className = 'three-canvas';
    renderer.domElement.setAttribute('aria-hidden', 'true');
    document.body.appendChild(renderer.domElement);

    var canvas = document.createElement('canvas');
    canvas.width = 256; canvas.height = 256;
    var ctx = canvas.getContext('2d');
    var grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
    grad.addColorStop(0, '#79fff2');
    grad.addColorStop(0.52, '#6ba5ff');
    grad.addColorStop(1, '#ffb86b');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    var texture = new THREE.CanvasTexture(canvas);
    var material = new THREE.MeshBasicMaterial({ map: texture, opacity: 0.55, transparent: true });
    var cube = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.5, 1.5), material);
    scene.add(cube);
    camera.position.z = 8;

    function place() {
      if (window.innerWidth < 820) {
        cube.position.set(2.6, -3.6, 0);
        cube.scale.setScalar(0.55);
      } else {
        cube.position.set(-5.6, 1.4, 0);
        cube.scale.setScalar(0.95);
      }
    }
    place();

    function pointerPos(e) {
      var p = (e.touches && e.touches[0]) ? e.touches[0] : e;
      var r = renderer.domElement.getBoundingClientRect();
      return {
        x: ((p.clientX - r.left) / (r.right - r.left)) * 2 - 1,
        y: -((p.clientY - r.top) / (r.bottom - r.top)) * 2 + 1
      };
    }

    function move(e) {
      var pp = pointerPos(e);
      var v = new THREE.Vector3(pp.x, pp.y, 0.5);
      v.unproject(camera);
      var dir = v.sub(camera.position).normalize();
      var distance = -camera.position.z / dir.z;
      var pos = camera.position.clone().add(dir.multiplyScalar(distance));
      pos.multiplyScalar(0.55);
      cube.position.copy(pos).negate();
      var s = 0.85 + (Math.abs(pp.x) + Math.abs(pp.y)) * 0.18;
      cube.scale.set(s, s, s);
    }

    window.addEventListener('mousemove', move, false);
    window.addEventListener('resize', function () {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      place();
    });

    function render() {
      requestAnimationFrame(render);
      cube.rotation.x += 0.003;
      cube.rotation.y += 0.012;
      cube.rotation.z += 0.001;
      renderer.setClearColor(0x101316, 0);
      renderer.render(scene, camera);
    }
    render();
  </script>
</body>

</html>
