  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: #101316;
      color: #f8f7f1;
      font-family: 'Raleway', sans-serif;
      font-size: 16px;
      line-height: 1.6;
      overflow: hidden;
    }

    .icon-home {
      position: fixed;
      top: 22px;
      left: 26px;
      z-index: 4;
      display: inline-flex;
      gap: 6px;
      align-items: center;
      color: #f8f7f1;
      text-decoration: none;
    }
    .icon-home i { font-size: 18px; }
    .icon-home:hover { color: #9af8e9; }

    .top-back {
      position: fixed;
      top: 24px;
      right: 28px;
      z-index: 4;
      color: #d9dfd7;
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    .top-back:hover { color: #9af8e9; }

    main {
      position: relative;
      z-index: 2;
      height: 100vh;
      display: grid;
      align-content: center;
      padding: 96px 56px 64px 140px;
      max-width: 1240px;
      margin: 0 auto;
    }

    .left-stack { max-width: 560px; }

    h1.hello {
      font-family: 'Crimson Text', serif;
      font-style: italic;
      font-weight: 400;
      font-size: clamp(120px, 18vw, 220px);
      line-height: 0.85;
      letter-spacing: -0.03em;
      margin: 0 0 36px -8px;
    }

    .lede {
      color: #d9dfd7;
      font-size: 18px;
      max-width: 480px;
      margin-bottom: 28px;
    }
    .lede a {
      color: #f8f7f1;
      border-bottom: 1px solid rgba(248, 247, 241, 0.4);
      text-decoration: none;
      padding-bottom: 1px;
    }
    .lede a:hover { color: #9af8e9; border-color: #9af8e9; }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 18px 24px;
      max-width: 480px;
    }
    .links a {
      color: #d9dfd7;
      text-decoration: none;
      font-size: 14px;
      letter-spacing: 0.04em;
      display: inline-flex;
      gap: 8px;
      align-items: center;
    }
    .links a i { font-size: 16px; color: #9aa1a3; }
    .links a:hover { color: #9af8e9; }
    .links a:hover i { color: #9af8e9; }

    .three-canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
      pointer-events: none;
    }

    @media (max-width: 820px) {
      main { padding: 96px 28px 64px; }
      h1.hello { font-size: clamp(100px, 28vw, 160px); margin-left: 0; }
    }

<body>
  <a href="./index.html" class="icon-home" aria-label="Dean Guo home">

  <main>
    <div class="left-stack">
      <h1 class="hello">say hi!</h1>
      <p class="lede">
        reach me via email — <a href="mailto:deanguonyc@gmail.com">deanguonyc@gmail.com</a>
      </p>
      <div class="links">
        <a href="https://www.linkedin.com/in/deanguo"><i class="fa fa-linkedin-square fa-fw"></i> LinkedIn</a>
        <a href="http://soundcloud.com/fourestfiredemos"><i class="fa fa-soundcloud fa-fw"></i> SoundCloud</a>
      </div>
    </div>
  </main>

  <script src="js/three.js"></script>
  <script>
    var scene = new THREE.Scene();
    var camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);

    var renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.domElement.className = 'three-canvas';
    renderer.domElement.setAttribute('aria-hidden', 'true');
    document.body.appendChild(renderer.domElement);

    var canvas = document.createElement('canvas');
    canvas.width = 256; canvas.height = 256;
    var ctx = canvas.getContext('2d');
    var grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
    grad.addColorStop(0, '#79fff2');
    grad.addColorStop(0.52, '#6ba5ff');
    grad.addColorStop(1, '#ffb86b');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    var texture = new THREE.CanvasTexture(canvas);
    var material = new THREE.MeshBasicMaterial({ map: texture, opacity: 0.55, transparent: true });
    var cube = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.5, 1.5), material);
    scene.add(cube);
    camera.position.z = 8;

    var cubeBiasX = 0;
    var cubeBaseScale = 1;
    function place() {
      if (window.innerWidth < 820) {
        cubeBiasX = 0;
        cubeBaseScale = 1.0;
        cube.position.set(2.6, -3.6, 0);
      } else {
        cubeBiasX = 4.6;
        cubeBaseScale = 2.3;
        cube.position.set(5.5, -0.6, 0);
      }
      cube.scale.setScalar(cubeBaseScale);
    }
    place();

    function pointerPos(e) {
      var p = (e.touches && e.touches[0]) ? e.touches[0] : e;
      var r = renderer.domElement.getBoundingClientRect();
      return {
        x: ((p.clientX - r.left) / (r.right - r.left)) * 2 - 1,
        y: -((p.clientY - r.top) / (r.bottom - r.top)) * 2 + 1
      };
    }

    function move(e) {
      var pp = pointerPos(e);
      var v = new THREE.Vector3(pp.x, pp.y, 0.5);
      v.unproject(camera);
      var dir = v.sub(camera.position).normalize();
      var distance = -camera.position.z / dir.z;
      var pos = camera.position.clone().add(dir.multiplyScalar(distance));
      pos.multiplyScalar(0.35);
      pos.negate();
      pos.x += cubeBiasX;
      cube.position.copy(pos);
      var s = cubeBaseScale + (Math.abs(pp.x) + Math.abs(pp.y)) * 0.35;
      cube.scale.set(s, s, s);
    }

    window.addEventListener('mousemove', move, false);
    window.addEventListener('resize', function () {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      place();
    });

    function render() {
      requestAnimationFrame(render);
      cube.rotation.x += 0.003;
      cube.rotation.y += 0.012;
      cube.rotation.z += 0.001;
      renderer.setClearColor(0x101316, 0);
      renderer.render(scene, camera);
    }
    render();
  </script>
</body>
